{% load static %}
<!DOCTYPE HTML>
<html>
	<head>
		<title>{% block title %}{% endblock %}</title>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1">
		<link rel="stylesheet" href="{% static 'core/css/main.css'%}" />
		<!-- Importar VUE -->
		<script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
		<!-- Este bloque permite que cada app inyecte su propio CSS aquí -->
   		 {% block extra_css %}{% endblock %}
		<style>
        /* Estilo básico para ocultar secciones */
			section { border: none !important; }
			/* Estilo opcional para suavizar la transición */
			[v-cloak] { display: none; } 
		</style>
	</head>
	<body class="is-preload">
		<!-- envolvemos todo en app para darle control a vue -->
         <div id="app" v-cloak>
			{% if user.is_authenticated %}
				{% include 'shared/navbar.html' %}
			{% endif %}
			
			<div id="main" {% if not user.is_authenticated %}style="margin-left: 0;"{% endif %}>
				{% block body %}{% endblock %}
			</div>

			{% if user.is_authenticated %}
				{% include 'shared/footer.html' %}
			{% endif %}
		</div>
		

		<!-- Scripts awesome-->
			<script src="{% static 'core/js/jquery.min.js' %}"></script>
			<script src="{% static 'core/js/jquery.scrolly.min.js' %}"></script>
			<script src="{% static 'core/js/jquery.scrollex.min.js' %}"></script>
			<script src="{% static 'core/js/browser.min.js' %}"></script>
			<script src="{% static 'core/js/breakpoints.min.js' %}"></script>
			<script src="{% static 'core/js/util.js' %}"></script>
			<script src="{% static 'core/js/main.js' %}"></script>

		<!-- Lógica de Vue -->
		<script>
			const { createApp } = Vue

			createApp({
				data() {
					return {
						// --- NAVEGACIÓN Y ESTADO ---
						seccionActual: (function() {
							const path = window.location.pathname;
							if (path.includes('/DRBPA/nuevo/')) return 'nuevo'; // Si es la URL del formulario
							if (path.includes('/DRBPA/')) return 'inicio';      // Si es el panel de DRBPA
							return 'buscar';                                    // Por defecto DARI
						})(),
						cargando: false,

						// --- BÚSQUEDA ---
						tipoBusqueda: 'persona',
						queryBusqueda: '',
						resultados: [],
						paginaActual: 1,
						resultadosPorPagina: 25,
						
						filtrosPersona: {
							nombre1: '', nombre2: '',
							apellido1: '', apellido2: '',
							documento: '', alias: ''
						},

						// --- GESTIÓN DE EXPEDIENTES ---
						expediente: {
							id: null, codigo: '', observaciones: '',
							subido_alfresco: false, personas: [], movimientos: []
						},
						expedientesRecientes: [],
						nuevoExpediente: {
							codigo: '', oficina_id: '',
							fecha: new Date().toISOString().split('T')[0],
							observaciones: ''
						},
						
						editandoObs: false,
						obsTemporal: '',

						// --- GESTIÓN DE PERSONAS ---
						personasVinculadas: [],
						nuevaPersona: {
							primer_nombre: '', segundo_nombre: '',
							primer_apellido: '', segundo_apellido: '',
							alias: '', tipo_documento_id: '', documento: '',
							fecha_nacimiento: '', nacionalidad_nombre: '', rol: 'indagado'
						},
						queryPersonaExistente: '',
						resultadosSugeridos: [],

						personaPerfil: {
							id: null, primer_nombre: '', segundo_nombre: '',
							primer_apellido: '', segundo_apellido: '',
							fecha_nacimiento: '', nacionalidad: '',
							identificaciones: [], expedientes: [], aliases: []
						},
						nuevoDocPerfil: { tipo_documento_id: '', numero: '' },
						nuevoAliasPerfil: '',
						editandoPersona: false,
						personaEdit: {},

						// --- MOVIMIENTOS ---
						nuevoMovimiento: {
							codigo_expediente: '', origen_id: '', destino_id: '',
							fecha: '', entregado_por: '', recibido_por: '', observaciones: ''
						},
						ultimoDestinoId: null,
						historialBusqueda: [],

						// --- OFICINAS INACTIVAS ---
						mostrarInactivasOrigen: false,
						mostrarInactivasDestino: false,
						mostrarInactivasCrear: false,

						// --- DATOS MAESTROS ---
						oficinas: [],
						paises: [],
						tiposDocumento: [],

						// --- APP DRBPA (CORREGIDO: Ahora dentro del return) ---
						maestros: {
							paises: [],
							tipos_doc: [],
							departamentos: [],
							dependencias: []
						},
						form: {
							tipo_doc_id: '', documento: '',
							p_nombre: '', s_nombre: '',
							p_apellido: '', s_apellido: '',
							alias: '', genero: 'MASCULINO',
							fecha_nac: '', edad: '',
							pais_nombre: 'URUGUAY',
							depto_id: '', dep_id: '',
							equipo: '', lugar: 'DOMICILIO',
							nro_sgsp: '', tipificacion: '',
							f_hecho: '', f_ingreso_sgsp: ''
						},
						documentoValido: false,
						personaExiste: false,
						dependenciasFiltradas: []
					}
				},

				computed: {
					resultadosPaginados() {
						let inicio = (this.paginaActual - 1) * this.resultadosPorPagina;
						return this.resultados.slice(inicio, inicio + this.resultadosPorPagina);
					},
					totalPaginas() {
						return Math.ceil(this.resultados.length / this.resultadosPorPagina);
					},
					movimientosResumidos() {
						return (this.expediente.movimientos && this.expediente.movimientos.length > 0) ? this.expediente.movimientos.slice(0, 3) : [];
					},
					oficinasFiltradasCrear() {
						if (this.mostrarInactivasCrear) return this.oficinas;
						return this.oficinas.filter(o => o.activa);
					},
					oficinasFiltradasOrigen() {
						if (this.mostrarInactivasOrigen) return this.oficinas;
						return this.oficinas.filter(o => o.activa);
					},
					oficinasFiltradasDestino() {
						if (this.mostrarInactivasDestino) return this.oficinas;
						return this.oficinas.filter(o => o.activa);
					},
					esDashboard() {
						return window.location.pathname.includes('/dashboard/');
					},
					esDRBPA() {
						return window.location.pathname.includes('/DRBPA/');
					},
					calcularEdadFrontend() {
						if (!this.form.fecha_nac) return '';
						const birthDate = new Date(this.form.fecha_nac);
						const today = new Date();
						let age = today.getFullYear() - birthDate.getFullYear();
						const m = today.getMonth() - birthDate.getMonth();
						if (m < 0 || (m === 0 && today.getDate() < birthDate.getDate())) {
							age--;
						}
						return age;
					},
				},

				mounted() {
					this.cargarOficinas();
					this.cargarPaises();
					this.cargarTiposDocumento();
					this.cargarRecientes();

					if (this.esDRBPA) {
						this.cargarMaestrosDRBPA();
					}

					const urlParams = new URLSearchParams(window.location.search);
					const seccionDesdeUrl = urlParams.get('s');
					if (seccionDesdeUrl) this.seccionActual = seccionDesdeUrl;
				},

				methods: {
							// =========================================================================
							// 1. UTILIDADES Y COMUNICACIÓN CON EL SERVIDOR (API)
							// =========================================================================

							/**
							* Helper centralizado para realizar peticiones fetch.
							* Añade automáticamente el prefijo /DARI a todas las rutas.
							*/
							async apiFetch(url, options = {}) {
								const response = await fetch(`/DARI${url}`, options);
								if (!response.ok) throw new Error('Error en la respuesta del servidor');
								return await response.json();
							},

							// =========================================================================
							// 2. CARGAS INICIALES DE DATOS MAESTROS
							// Se ejecutan al montar la aplicación para llenar los selectores (dropdowns).
							// =========================================================================

							async cargarOficinas() {
								try { const data = await this.apiFetch('/api/oficinas/'); this.oficinas = data.oficinas; }
								catch (e) { console.error("Error al cargar oficinas:", e); }
							},
							async cargarPaises() {
								try { const data = await this.apiFetch('/api/paises/'); this.paises = data.paises; }
								catch (e) { console.error("Error al cargar países:", e); }
							},
							async cargarTiposDocumento() {
								try { const data = await this.apiFetch('/api/tipos-documento/'); this.tiposDocumento = data.tipos; }
								catch (e) { console.error("Error al cargar tipos de documento:", e); }
							},
							async cargarRecientes() {
								try { const data = await this.apiFetch('/api/recientes/'); this.expedientesRecientes = data.recientes; }
								catch (e) { console.error("Error al cargar expedientes recientes:", e); }
							},

							// =========================================================================
							// 3. MÓDULO DE BÚSQUEDA (APLICACIÓN DARI)
							// =========================================================================

							/**
							* Búsqueda rápida: busca en todos los campos (nombre, alias, documento).
							* Limpia los filtros avanzados para evitar conflictos.
							*/
							async buscar() {
								if (!this.queryBusqueda.trim()) return;
								this.cargando = true;
								this.paginaActual = 1;
								this.filtrosPersona = { nombre1: '', nombre2: '', apellido1: '', apellido2: '', documento: '', alias: '' };
								try {
									const data = await this.apiFetch(`/api/buscar/?tipo=${this.tipoBusqueda}&q=${encodeURIComponent(this.queryBusqueda)}&mode=quick`);
									this.resultados = data.resultados;
								} catch (e) { console.error("Error en búsqueda rápida:", e); }
								finally { this.cargando = false; }
							},

							/**
							* Búsqueda avanzada: utiliza campos específicos para mejorar la velocidad
							* y precisión atacando directamente las columnas indexadas en PostgreSQL.
							*/
							async buscarAvanzado() {
								this.cargando = true;
								this.paginaActual = 1;
								try {
									let params = new URLSearchParams({
										tipo: 'persona', mode: 'advanced',
										n1: this.filtrosPersona.nombre1, n2: this.filtrosPersona.nombre2,
										a1: this.filtrosPersona.apellido1, a2: this.filtrosPersona.apellido2,
										doc: this.filtrosPersona.documento, alias: this.filtrosPersona.alias
									});
									const data = await this.apiFetch(`/api/buscar/?${params.toString()}`);
									this.resultados = data.resultados;
								} catch (e) { console.error("Error en búsqueda avanzada:", e); }
								finally { this.cargando = false; }
							},

							// =========================================================================
							// 4. GESTIÓN DE EXPEDIENTES
							// =========================================================================

							/**
							* Carga toda la información de un expediente: personas, observaciones y movimientos.
							* También identifica la última oficina para autocompletar futuros traslados.
							*/
							async verDetalles(id) {
								this.cargando = true;
								try {
									const data = await this.apiFetch(`/api/expediente/${id}/`);
									this.expediente = data;
									this.personasVinculadas = data.personas;
									// Si el expediente ya se movió, el origen es su último destino; si no, su oficina de creación.
									this.ultimoDestinoId = data.movimientos.length > 0 ? data.movimientos[0].destino_id : data.oficina_id;
									this.seccionActual = 'detalles';
								} catch (error) { alert("Error al cargar los detalles del expediente."); }
								finally { this.cargando = false; }
							},

							/**
							* Guarda la edición de la caja de observaciones del expediente.
							*/
							async guardarEdicionObs() {
								try {
									await this.apiFetch(`/api/expediente/${this.expediente.id}/update-obs/`, {
										method: 'POST',
										headers: { 'Content-Type': 'application/json', 'X-CSRFToken': '{{ csrf_token }}' },
										body: JSON.stringify({ observaciones: this.obsTemporal })
									});
									this.expediente.observaciones = this.obsTemporal;
									this.editandoObs = false;
									alert("Observaciones actualizadas.");
								} catch (e) { console.error("Error al actualizar observaciones:", e); }
							},

							activarEdicionObs() { this.obsTemporal = this.expediente.observaciones; this.editandoObs = true; },
							cancelarEdicionObs() { this.editandoObs = false; },

							// =========================================================================
							// 5. GESTIÓN DE PERSONAS E IDENTIDADES
							// =========================================================================

							/**
							* Carga la ficha biográfica completa de una persona (Perfil).
							*/
							async verPerfilPersona(id) {
								try {
									const data = await this.apiFetch(`/api/persona/${id}/`);
									this.personaPerfil = data;
									this.seccionActual = 'persona_perfil';
								} catch (e) { console.error("Error al cargar el perfil:", e); }
							},

							/**
							* Valida el documento e intenta vincular una persona nueva al expediente actual.
							*/
							async agregarPersona() {
								try {
									const response = await fetch(`/DARI/api/expediente/${this.expediente.id}/vincular-persona/`, {
										method: 'POST',
										headers: { 'Content-Type': 'application/json', 'X-CSRFToken': '{{ csrf_token }}' },
										body: JSON.stringify(this.nuevaPersona)
									});
									if (response.ok) {
										alert("Persona vinculada correctamente.");
										this.verDetalles(this.expediente.id); // Refresca la tabla inferior
										// Reset de estados de validación
										this.documentoValidoDARI = false;
										this.personaExisteDARI = false;
									}
								} catch (e) { console.error("Error al vincular persona:", e); }
							},

							/**
							* Rompe la relación entre una persona y el expediente (no borra al sujeto).
							*/
							async quitarPersona(personaId) {
								if (!confirm("¿Está seguro de que desea quitar a esta persona del expediente?")) return;
								try {
									await this.apiFetch(`/api/expediente/${this.expediente.id}/desvincular/`, {
										method: 'POST',
										headers: { 'Content-Type': 'application/json', 'X-CSRFToken': '{{ csrf_token }}' },
										body: JSON.stringify({ persona_id: personaId })
									});
									this.verDetalles(this.expediente.id);
								} catch (e) { console.error("Error al desvincular:", e); }
							},

							// =========================================================================
							// 6. TRASLADOS Y LOGÍSTICA
							// =========================================================================

							/**
							* Prepara el formulario de traslado con la oficina de origen autocompletada.
							*/
							abrirRegistroMovimiento() {
								this.nuevoMovimiento = {
									codigo_expediente: this.expediente.codigo, 
									origen_id: this.ultimoDestinoId,
									destino_id: '', 
									fecha: new Date().toISOString().slice(0, 16),
									entregado_por: '', recibido_por: '', observaciones: ''
								};
								this.seccionActual = 'registrar_movimiento';
							},

							async guardarMovimiento() {
								try {
									await this.apiFetch('/api/movimientos/registrar/', {
										method: 'POST',
										headers: { 'Content-Type': 'application/json', 'X-CSRFToken': '{{ csrf_token }}' },
										body: JSON.stringify(this.nuevoMovimiento)
									});
									alert("Traslado registrado y ubicación del expediente actualizada.");
									this.verDetalles(this.expediente.id);
								} catch(e){ alert("Error al registrar el traslado."); }
							},

							// =========================================================================
							// 7. ALGORITMOS DE VALIDACIÓN (CÉDULA URUGUAYA)
							// =========================================================================

							/**
							* Valida el dígito verificador de una CI uruguaya (6 o 7 dígitos + DV).
							* Basado en el algoritmo oficial de producto escalar.
							*/
							validarCIUruguaya(ci) {
								let numero = ci.replace(/\D/g, ''); // Limpiar caracteres no numéricos
								if (numero.length < 7 || numero.length > 8) return false;
								
								// Si tiene 7 dígitos, normalizar a 8 agregando un cero inicial
								if (numero.length === 7) numero = '0' + numero;

								const digitos = numero.split('').map(Number);
								const dvIngresado = digitos.pop(); // Último dígito
								const factores = [2, 9, 8, 7, 6, 3, 4];
								
								let suma = 0;
								for (let i = 0; i < 7; i++) {
									suma += digitos[i] * factores[i];
								}

								const resto = suma % 10;
								const dvCalculado = (10 - resto) % 10;
								return dvCalculado === dvIngresado;
							},

							/**
							* Lógica de validación para la App DARI (Sección Vincular Persona).
							* Valida integridad de CI uruguaya y autocompleta si ya existe en DB.
							*/
							async verificarPersonaDARI() {
								// 1. Resetear estados cada vez que el usuario sale del campo
								this.documentoValidoDARI = false;
								this.personaExisteDARI = false;

								// 2. Validación de orden: Primero el tipo de documento
								if (!this.nuevaPersona.tipo_documento_id) {
									if (this.nuevaPersona.documento) {
										alert("FLUJO OBLIGATORIO: Seleccione primero el TIPO DE DOCUMENTO antes de ingresar el número.");
										this.nuevaPersona.documento = '';
									}
									return;
								}

								// 3. Detectar si es Cédula para aplicar algoritmo
								const tipoSel = this.tiposDocumento.find(t => t.id === this.nuevaPersona.tipo_documento_id);
								const esCI = tipoSel && tipoSel.nombre.toUpperCase().includes("CEDULA");

								// Limpiamos espacios por si pegaron el número
								const docLimpio = this.nuevaPersona.documento.trim();

								if (docLimpio.length > 5) {
									// A. Validar integridad física del documento (Algoritmo)
									if (esCI) {
										if (!this.validarCIUruguaya(docLimpio)) {
											alert("DATOS ERRÓNEOS: El número de Cédula no es válido (Fallo en el dígito verificador).");
											this.nuevaPersona.documento = '';
											return;
										}
									}

									// B. MARCAR COMO VÁLIDO (Esto activa el mensaje de "Sujeto nuevo" inmediatamente)
									this.documentoValidoDARI = true;

									// C. Consultar existencia en el servidor (Búsqueda por coincidencia exacta)
									try {
										const res = await fetch(`/DARI/api/buscar/?q=${encodeURIComponent(docLimpio)}&tipo=persona`);
										const data = await res.json();
										
										if (data.resultados.length > 0) {
											// Filtramos por documento exacto para evitar errores de nombres similares
											const p = data.resultados.find(r => r.documento.includes(docLimpio));
											
											if (p) {
												// Autocompletado de la ficha
												this.nuevaPersona.primer_nombre = p.primer_nombre;
												this.nuevaPersona.segundo_nombre = p.segundo_nombre;
												this.nuevaPersona.primer_apellido = p.primer_apellido;
												this.nuevaPersona.segundo_apellido = p.segundo_apellido;
												this.nuevaPersona.fecha_nacimiento = p.fecha_nacimiento_iso;
												this.nuevaPersona.nacionalidad_nombre = p.nacionalidad_nombre;
												this.personaExisteDARI = true; // Cambia el mensaje a "Persona registrada"
											}
										}
									} catch (e) {
										console.error("Error en la comunicación con la API de búsqueda:", e);
									}
								}
							},

				// =========================================================================
				// 8. MÓDULO ESPECÍFICO DRBPA (PERSONAS AUSENTES)
				// =========================================================================

				async cargarMaestrosDRBPA() {
					try {
						const response = await fetch('/DRBPA/api/maestros-drbpa/');
						const data = await response.json();
						this.maestros = data;
					} catch (e) { console.error("Error al cargar maestros DRBPA"); }
				},

				/**
				* Lógica de validación para la App DRBPA (Nuevo Registro).
				*/
				async verificarPersona() {
					this.documentoValido = false;
					this.personaExiste = false;

					if (!this.form.tipo_doc_id) {
						if (this.form.documento) {
							alert("POR FAVOR: Seleccione primero el TIPO DE DOCUMENTO.");
							this.form.documento = '';
						}
						return;
					}

					const tipoSeleccionado = this.tiposDocumento.find(t => t.id === this.form.tipo_doc_id);
					const esCI = tipoSeleccionado && tipoSeleccionado.nombre.toUpperCase().includes("CEDULA");

					if (this.form.documento.length > 5) {
						if (esCI && !this.validarCIUruguaya(this.form.documento)) {
							alert("ATENCIÓN: Cédula no válida.");
							this.form.documento = '';
							return;
						}
						this.documentoValido = true;

						try {
							const res = await fetch(`/DARI/api/buscar/?q=${this.form.documento}&tipo=persona`);
							const data = await res.json();
							if (data.resultados.length > 0) {
								const p = data.resultados[0];
								this.form.p_nombre = p.primer_nombre;
								this.form.s_nombre = p.segundo_nombre;
								this.form.p_apellido = p.primer_apellido;
								this.form.s_apellido = p.segundo_apellido;
								this.form.fecha_nac = p.fecha_nacimiento_iso;
								this.form.pais_nombre = p.nacionalidad_nombre;
								this.personaExiste = true;
							}
						} catch (e) { console.error("Error de verificación remota DRBPA"); }
					}
				},

				/**
				* Filtra dinámicamente las seccionales de Uruguay según el departamento elegido.
				*/
				filtrarDeps() {
					if (!this.maestros.dependencias) return;
					this.dependenciasFiltradas = this.maestros.dependencias.filter(
						d => d.departamento_id === this.form.depto_id
					);
				},

				async guardarFicha() {
					try {
						const response = await fetch('/DRBPA/api/guardar-ficha/', {
							method: 'POST',
							headers: { 'Content-Type': 'application/json', 'X-CSRFToken': '{{ csrf_token }}' },
							body: JSON.stringify(this.form)
						});
						if (response.ok) {
							const data = await response.json();
							alert("Ficha creada con éxito. Caso Nro: " + data.nro_caso);
							window.location.href = "/DRBPA/";
						}
					} catch (e) { alert("Error al procesar el registro de ausencia."); }
				},

				// =========================================================================
				// 9. EDICIÓN BIOGRÁFICA Y OTROS (PERFIL)
				// =========================================================================

				activarEdicionPersona() {
					this.personaEdit = {
						primer_nombre: this.personaPerfil.primer_nombre,
						segundo_nombre: this.personaPerfil.segundo_nombre,
						primer_apellido: this.personaPerfil.primer_apellido,
						segundo_apellido: this.personaPerfil.segundo_apellido,
						fecha_nacimiento: this.personaPerfil.fecha_nacimiento_iso,
						nacionalidad_nombre: this.personaPerfil.nacionalidad
					};
					this.editandoPersona = true;
				},

				async guardarEdicionPersona() {
					try {
						await this.apiFetch(`/api/persona/${this.personaPerfil.id}/update-bio/`, {
							method: 'POST',
							headers: { 'Content-Type': 'application/json', 'X-CSRFToken': '{{ csrf_token }}' },
							body: JSON.stringify(this.personaEdit)
						});
						alert("Perfil actualizado correctamente.");
						this.editandoPersona = false;
						this.verPerfilPersona(this.personaPerfil.id);
					} catch (e) { alert("Error al actualizar la biografía."); }
				},

				async guardarNuevoAliasPerfil() {
					if (!this.nuevoAliasPerfil.trim()) return;
					try {
						await this.apiFetch(`/api/persona/${this.personaPerfil.id}/alias/`, {
							method: 'POST',
							headers: { 'Content-Type': 'application/json', 'X-CSRFToken': '{{ csrf_token }}' },
							body: JSON.stringify({ alias: this.nuevoAliasPerfil })
						});
						this.nuevoAliasPerfil = '';
						this.verPerfilPersona(this.personaPerfil.id);
					} catch (e) { console.error(e); }
				},

				async guardarNuevoDocPerfil() {
					try {
						await this.apiFetch(`/api/persona/${this.personaPerfil.id}/identificacion/`, {
							method: 'POST',
							headers: { 'Content-Type': 'application/json', 'X-CSRFToken': '{{ csrf_token }}' },
							body: JSON.stringify(this.nuevoDocPerfil)
						});
						this.nuevoDocPerfil = { tipo_documento_id: '', numero: '' };
						this.verPerfilPersona(this.personaPerfil.id);
					} catch (e) { alert("Error al añadir documento o documento ya existente."); }
				},

				async guardarCambioAlfresco() {
					try {
						await this.apiFetch(`/api/expediente/${this.expediente.id}/alfresco/`, {
							method: 'POST',
							headers: { 'Content-Type': 'application/json', 'X-CSRFToken': '{{ csrf_token }}' },
							body: JSON.stringify({ estado: this.expediente.subido_alfresco })
						});
						alert("Estado digital actualizado.");
					} catch (e) { console.error(e); }
				},

				async buscarHistorial() {
					try {
						const data = await this.apiFetch(`/api/movimientos/historial/?codigo=${this.nuevoMovimiento.codigo_expediente}`);
						this.historialBusqueda = data.historial;
					} catch (e) { console.error(e); }
				},

				async guardarNuevoExpediente() {
					try {
						const data = await this.apiFetch('/api/expediente/crear/', {
							method: 'POST',
							headers: { 'Content-Type': 'application/json', 'X-CSRFToken': '{{ csrf_token }}' },
							body: JSON.stringify(this.nuevoExpediente)
						});
						alert("Expediente creado con éxito.");
						this.cargarRecientes();
						this.verDetalles(data.id);
					} catch (e) { alert("Error al crear: el código podría estar duplicado o hubo un fallo de red."); }
				}
} // fin methods
			}).mount('#app')
		</script>
        
	</body>
</html>
