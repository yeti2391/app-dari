{% load static %}
<!DOCTYPE HTML>
<html>
	<head>
		<title>{% block title %}{% endblock %}</title>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
		<link rel="stylesheet" href="{% static 'core/css/main.css'%}" />
		<!-- Importar VUE -->
		<script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
		<style>
        /* Estilo básico para ocultar secciones */
			section { border: none !important; }
			/* Estilo opcional para suavizar la transición */
			[v-cloak] { display: none; } 
		</style>
	</head>
	<body class="is-preload">
		<!-- envolvemos todo en app para darle control a vue -->
         <div id="app" v-cloak>
			{% include './snippets/navbar.html' %}
			
			{% block body %}{% endblock %}

			{% include './snippets/footer.html' %}
		</div>
		

		<!-- Scripts awesome-->
			<script src="{% static 'core/js/jquery.min.js' %}"></script>
			<script src="{% static 'core/js/jquery.scrolly.min.js' %}"></script>
			<script src="{% static 'core/js/jquery.scrollex.min.js' %}"></script>
			<script src="{% static 'core/js/browser.min.js' %}"></script>
			<script src="{% static 'core/js/breakpoints.min.js' %}"></script>
			<script src="{% static 'core/js/util.js' %}"></script>
			<script src="{% static 'core/js/main.js' %}"></script>

		<!-- Lógica de Vue -->
		<script>
			const { createApp } = Vue
			createApp({
				data() {
					return {
						seccionActual: 'buscar',
						alfrescoStatus: false, // Controla el Switch
						nuevaPersona: { nombre: '', apellido: '', doc: '', nacionalidad: 'Uruguaya' },
						personasVinculadas: [
							{ nombre: 'Juan', apellido: 'Pérez', doc: '1.234.567-8', nacionalidad: 'Uruguaya' }
						]
					}
				},
				methods: {
					agregarPersona() {
						if(this.nuevaPersona.nombre && this.nuevaPersona.doc) {
							this.personasVinculadas.push({...this.nuevaPersona});
							// Limpiar campos
							this.nuevaPersona = { nombre: '', apellido: '', doc: '', nacionalidad: 'Uruguaya' };
						} else {
							alert("Por favor completa Nombre y Documento");
						}
					},
					verDetalles(idExpediente) {
						// Aquí en el futuro cargarás los datos del servidor vía fetch/axios
						this.seccionActual = 'detalles';
					}
				}
			}).mount('#app')
		</script>
        
	</body>
</html>
