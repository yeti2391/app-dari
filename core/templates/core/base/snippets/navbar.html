{% load static %}

<!-- Header -->
<div id="header">

    <div class="top">

        <!-- Logo -->
        <div id="logo">
            <span class="image avatar48">
                <img src="{% static 'core/img/LogoDGLCCO.webp' %}" alt="Logo DGLCCO" />
            </span>
            
            <!-- Cargamos Nombre y Apellido del usuario logueado -->
            <h1 id="title">
                {% if user.get_full_name %}
                    {{ user.get_full_name }}
                {% else %}
                    {{ user.username }}
                {% endif %}
            </h1>

            <!-- Cargamos el grupo (o grupos) del usuario -->
            <p>
                {% for group in user.groups.all %}
                    {{ group.name }}{% if not forloop.last %}, {% endif %}
                {% empty %}
                    Sin Grupo Asignado
                {% endfor %}
            </p>
        </div>

        <!-- Nav Modificado para Vue -->
        <nav id="nav">
            <ul>
                <!-- Usamos :class para que el estilo 'active' cambie dinámicamente -->
                <li :class="{ 'active': seccionActual === 'buscar' }">
                    <a href="#" @click.prevent="seccionActual = 'buscar'" id="top-link">
                        <span class="icon solid fa-search">Buscar</span>
                    </a>
                </li>
                       
                <li :class="{ 'active': seccionActual === 'crear' }">
                    <a href="#" @click.prevent="seccionActual = 'crear'" id="about-link">
                        <span class="icon solid fa-folder-plus">Crear expediente</span>
                    </a>
                </li>
                
                <li :class="{ 'active': seccionActual === 'contacto' }">
                    <a href="#" @click.prevent="seccionActual = 'contacto'" id="contact-link">
                        <span class="icon solid fa-envelope">Contacto</span>
                    </a>
                </li>
            </ul>
        </nav>

    </div>
    <!-- Enlaces de Interés (estos pueden quedar como links normales) 
    <div class="bottom">
        
        <ul class="icons">
            <li><a href="#" class="icon brands fa-twitter"><span class="label">Twitter</span></a></li>
            <li><a href="#" class="icon brands fa-facebook-f"><span class="label">Facebook</span></a></li>
            <li><a href="#" class="icon brands fa-github"><span class="label">Github</span></a></li>
            <li><a href="#" class="icon brands fa-dribbble"><span class="label">Dribbble</span></a></li>
            <li><a href="#" class="icon solid fa-envelope"><span class="label">Email</span></a></li>
        </ul>
    </div>
    -->
</div>
